set -g prefix M-Space

set -g base-index 1
set -g detach-on-destroy off
set -g focus-events on
set -g history-limit 10000
set -g mouse on
set -g pane-base-index 1
set -g renumber-windows on
set -g status-justify absolute-centre
set -g status-position top
set -s escape-time 0
set -w -g main-pane-width 85

set -g default-terminal 'tmux-256color'
set -as terminal-features ',*:RGB'
set -ga terminal-overrides ',*:Tc,*:RGB'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -g set-clipboard on
set -g allow-passthrough on
set -ga update-environment "TERM_PROGRAM TERM_PROGRAM_VERSION"

bind M-space last-window

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r left resize-pane -L 2
bind-key -r down resize-pane -D 2
bind-key -r up resize-pane -U 2
bind-key -r right resize-pane -R 2

bind-key H next-layout
bind-key J swap-pane -D
bind-key K swap-pane -U

bind-key "'" split-window -h -c '#{pane_current_path}'
bind-key '\' split-window -h -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'
bind-key = split-window -v -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

bind P paste-buffer
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

unbind-key -T root MouseDown3Pane

%if "#{m/i:*dark*,#{FZF_THEME}}"
source-file ~/.tmux/dark.conf
%else
source-file ~/.tmux/light.conf
%endif
